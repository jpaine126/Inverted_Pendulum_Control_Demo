name: iSort

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - uses: isort/isort-action@master
        with:
          requirementsFiles: "requirements.txt requirements-test.txt"
